map $http_upgrade $xray_backend {
    "websocket" 8080;
    default      8081;
}

# Cloudflare CDN (sub.vpnnkrns.ru) → всегда WS
server {
    listen 80;
    server_name sub.vpnnkrns.ru;

    location /vpn {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}

# 185.21.8.91: WS (YC relay) или XHTTP (Yandex CDN) — по заголовку Upgrade
server {
    listen 80;
    server_name 185.21.8.91;

    location /vpn {
        proxy_pass http://127.0.0.1:$xray_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
