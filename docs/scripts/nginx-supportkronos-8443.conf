# ЛК/подписка supportkronos.online по HTTPS на :8443 (порт 443 занят Xray REALITY).
# Домен grey-cloud в Cloudflare (CF-прокси убран — CF заблокирован в РФ),
# резолвится напрямую на Fornex 185.21.8.91. Сертификат Let's Encrypt через DNS-01.
# Файл на сервере: /etc/nginx/conf.d/supportkronos.conf
server {
    listen 8443 ssl http2;
    server_name supportkronos.online;

    ssl_certificate     /etc/letsencrypt/live/supportkronos.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supportkronos.online/privkey.pem;

    # X-Forwarded-Proto=https → Flask (ProxyFix) отдаёт https-ссылки (подписка/QR)
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Real-IP         $remote_addr;
    }
}
