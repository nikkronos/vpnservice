<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>🔐 VPN Admin</h1>
                <span class="header-sub">eu1 · Fornex · Германия</span>
            </div>
            <div class="header-right">
                <span class="update-time" id="update-time">—</span>
                <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↺ Обновить</button>
            </div>
        </header>

        <!-- Статус-бар -->
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot" id="dot-awg"></span>
                <span id="label-awg">AmneziaWG</span>
            </div>
            <div class="status-item">
                <span class="status-dot" id="dot-vless"></span>
                <span id="label-vless">VLESS</span>
            </div>
            <div class="status-sep"></div>
            <div class="status-item">
                <span class="stat-num" id="stat-users">—</span>
                <span class="stat-desc">пользователей</span>
            </div>
            <div class="status-item">
                <span class="stat-num" id="stat-peers">—</span>
                <span class="stat-desc">конфигов</span>
            </div>
        </div>

        <!-- Сводная статистика активности -->
        <section class="activity-section">
            <div class="section-header">
                <h2>Активность</h2>
            </div>
            <div class="activity-grid">
                <div class="activity-card">
                    <span class="activity-num" id="act-24h">—</span>
                    <span class="activity-label">за 24 часа</span>
                </div>
                <div class="activity-card">
                    <span class="activity-num" id="act-7d">—</span>
                    <span class="activity-label">за 7 дней</span>
                </div>
                <div class="activity-card">
                    <span class="activity-num" id="act-30d">—</span>
                    <span class="activity-label">за 30 дней</span>
                </div>
                <div class="activity-card">
                    <span class="activity-num" id="act-email">—</span>
                    <span class="activity-label">с email</span>
                </div>
                <div class="activity-card">
                    <span class="activity-num" id="act-proxy">—</span>
                    <span class="activity-label">MTProxy за 30д</span>
                </div>
                <div class="activity-card activity-card-traffic">
                    <span class="activity-num" id="act-traffic">—</span>
                    <span class="activity-label">общий трафик</span>
                </div>
            </div>
        </section>

        <!-- Таблица пользователей -->
        <section class="users-section">
            <div class="section-header">
                <h2>Пользователи</h2>
                <span class="traffic-note" id="traffic-note"></span>
            </div>
            <div class="table-wrap">
                <table class="users-table" id="users-table">
                    <thead>
                        <tr>
                            <th>Пользователь</th>
                            <th title="Авторизован по email">Email</th>
                            <th>IP</th>
                            <th title="↓ Принято / ↑ Отправлено">Трафик</th>
                            <th>Устройство</th>
                            <th>Последний сеанс</th>
                            <th title="Когда последний раз запрашивал MTProxy">Прокси</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr><td colspan="7" class="loading">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer>
            <a href="/recovery">Recovery →</a>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
